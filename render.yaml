databases:
  - name: apex-db
    databaseName: apex_training
    user: apex_admin
    plan: free

services:
  # ─── Django API ───────────────────────────────────────────────────────────────
  - type: web
    name: apex-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py seed_db && python manage.py seed_demo && python manage.py backfill_snapshots
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: apex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CORS_TRUSTED_ORIGINS
        sync: false
      - key: PASSWORD_RESET_LINK
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET_KEY
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: NINJA_API_KEY
        sync: false

  # ─── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: apex-app
    runtime: static
    rootDir: frontend
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /api/*
        destination: https://apex-api-REPLACE.onrender.com/api/:splat
      - type: rewrite
        source: /*
        destination: /index.html
