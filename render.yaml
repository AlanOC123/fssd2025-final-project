databases:
  - name: apex-db
    databaseName: apex_training
    user: apex_admin
    plan: free

services:
  # ─── Django API ───────────────────────────────────────────────────────────────
  - type: web
    name: apex-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: apex-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: apex-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://apex-app.onrender.com
      - key: CORS_TRUSTED_ORIGINS
        value: https://apex-app.onrender.com
      - key: PASSWORD_RESET_LINK
        value: https://apex-app.onrender.com/reset-password
      - key: DEFAULT_FROM_EMAIL
        value: noreply@apex.com
      - key: BREVO_API_KEY
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET_KEY
        sync: false
      - key: CLOUD_NAME
        sync: false
      - key: NINJA_API_KEY
        sync: false

  # ─── React Frontend ───────────────────────────────────────────────────────────
  - type: web
    name: apex-app
    runtime: node
    rootDir: frontend
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    startCommand: npx serve dist --single --listen $PORT
    plan: free
    envVars:
      - key: NODE_VERSION
        value: "20"
